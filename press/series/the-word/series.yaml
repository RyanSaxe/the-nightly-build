# The vocabulary desk: one coined word per night, its story told whole.
name: The Word
mode: open
section: "Language"
template: article
prompt: prompt.md
autopublish: true
strict: false
words: [800, 1100]
# Below the longread default on purpose: a word piece is the paper's
# smallest read, and five real sources (the coinage, the etymology, the
# usage it quotes) beat eight padded ones.
min_sources: 5
cadence: daily
