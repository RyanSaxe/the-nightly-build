# The advocacy desk, on the shipped opinion template: one position, argued
# from named holders, the strongest counter answered.
name: The Position
mode: open
section: "Opinion"
template: opinion
prompt: prompt.md
autopublish: true
strict: false
words: [1500, 2500]
cadence: daily
# An argued position stands on what its holders put their own names to, so
# most of what the piece cites is the record itself.
sources_by_kind:
  primary: [3, null]
