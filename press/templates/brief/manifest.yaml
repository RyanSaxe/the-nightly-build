# Press override of the shipped brief template. A press package replaces the
# shipped package wholesale, so skeleton.html and identity.md are copied beside
# this file unchanged. The only change is the item band: Daily News runs one
# long, grouped edition (10-16 items under four ordered labels), not the
# shipped 4-6. The labels are the grouping mechanism, governed in the series
# prompt. Everything else is the shipped contract.
about: "A batch of tonight's developments: an itemized nightly roundup, each item a judgment about why something matters."
class: shortread
items: [10, 16]
sections: [items, sources]
cite_rule: per-item
modes: [rolling, open]
chrome:
  - '<body class="nb-article">'
  - "<h2>Sources</h2>"
