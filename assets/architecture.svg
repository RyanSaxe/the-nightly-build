<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1030" viewBox="0 0 1600 1030" role="img" aria-labelledby="title description">
  <title id="title">The Nightly Build article production architecture</title>
  <desc id="description">The orchestrator reads the paper configuration, fans out isolated article desks, and supervises validation, pull requests, CI, and publication. Each desk runs a voice, research, writing, and editing chain whose artifacts become the pull request production record.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a9aa2"/>
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#d89017"/>
    </marker>
    <style>
      .background { fill: #fbfaf7; }
      .band { fill: #f1f5f5; stroke: #d7e0e1; stroke-width: 2; }
      .group { fill: #fffdf8; stroke: #e4c37d; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #c6d2d5; stroke-width: 2; }
      .source { fill: #eaf3f5; stroke: #83aab1; stroke-width: 2; }
      .role { fill: #fff3d8; stroke: #d89017; stroke-width: 2; }
      .record { fill: #f4eef9; stroke: #9c7db5; stroke-width: 2; }
      .gate { fill: #eaf5ed; stroke: #6d9c79; stroke-width: 2; }
      .failure { fill: #fff0ed; stroke: #c9796b; stroke-width: 2; }
      .title { fill: #10212b; font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #58707a; font-family: Arial, sans-serif; font-size: 17px; }
      .band-title { fill: #58707a; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1.5px; }
      .box-title { fill: #10212b; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .box-copy { fill: #58707a; font-family: Arial, sans-serif; font-size: 14px; }
      .artifact { fill: #795d98; font-family: monospace; font-size: 13px; }
      .edge-label { fill: #58707a; font-family: Arial, sans-serif; font-size: 13px; }
      .edge { fill: none; stroke: #8a9aa2; stroke-width: 2.5; marker-end: url(#arrow); }
      .gold-edge { fill: none; stroke: #d89017; stroke-width: 2.5; marker-end: url(#arrow-gold); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect class="background" width="1600" height="1030" rx="24"/>
  <text class="title" x="70" y="58">One night of The Nightly Build</text>
  <text class="subtitle" x="70" y="88">The orchestrator commissions parallel article desks, then follows each PR through validation and CI.</text>

  <rect class="band" x="55" y="115" width="1490" height="170" rx="18"/>
  <text class="band-title" x="80" y="145">TRUSTED NIGHT SHIFT</text>

  <rect class="source" x="80" y="170" width="240" height="78" rx="12"/>
  <text class="box-title" x="105" y="201">main</text>
  <text class="box-copy" x="105" y="225">engine + press/</text>

  <path class="edge" d="M320 209 H395"/>
  <rect class="role" x="395" y="170" width="320" height="78" rx="12"/>
  <text class="box-title" x="420" y="201">Orchestrator</text>
  <text class="box-copy" x="420" y="225">reads duty; commissions what is due</text>

  <path class="edge" d="M715 209 H790"/>
  <rect class="role" x="790" y="170" width="270" height="78" rx="12"/>
  <text class="box-title" x="815" y="201">Fan out</text>
  <text class="box-copy" x="815" y="225">one desk per article</text>

  <path class="edge" d="M1060 209 H1110 V170 H1140"/>
  <path class="edge" d="M1060 209 H1140"/>
  <path class="edge" d="M1060 209 H1110 V248 H1140"/>
  <rect class="box" x="1140" y="145" width="260" height="45" rx="10"/>
  <text class="box-title" x="1165" y="173">Desk A · own worktree</text>
  <rect class="box" x="1140" y="187" width="260" height="45" rx="10"/>
  <text class="box-title" x="1165" y="215">Desk B · own worktree</text>
  <rect class="box" x="1140" y="229" width="260" height="45" rx="10"/>
  <text class="box-title" x="1165" y="257">Desk … · own worktree</text>

  <rect class="group" x="55" y="320" width="1490" height="345" rx="18"/>
  <text class="band-title" x="80" y="350">ONE ARTICLE DESK · THE SAME TREE RUNS IN PARALLEL FOR EVERY DUE SECTION</text>

  <rect class="source" x="90" y="405" width="190" height="105" rx="12"/>
  <text class="box-title" x="115" y="440">Commission</text>
  <text class="box-copy" x="115" y="464">what this article covers</text>
  <text class="artifact" x="115" y="488">task.md</text>

  <path class="edge" d="M280 457 H325"/>
  <rect class="role" x="325" y="405" width="190" height="105" rx="12"/>
  <text class="box-title" x="350" y="440">Voice coach</text>
  <text class="box-copy" x="350" y="464">how it should sound</text>
  <text class="artifact" x="350" y="488">voice.md</text>

  <path class="edge" d="M515 457 H560"/>
  <rect class="role" x="560" y="405" width="205" height="105" rx="12"/>
  <text class="box-title" x="585" y="440">Researcher</text>
  <text class="box-copy" x="585" y="464">claims + evidence</text>
  <text class="artifact" x="585" y="488">research.md</text>

  <path class="edge" d="M765 457 H810"/>
  <rect class="role" x="810" y="405" width="190" height="105" rx="12"/>
  <text class="box-title" x="835" y="440">Writer</text>
  <text class="box-copy" x="835" y="464">article from the log</text>
  <text class="artifact" x="835" y="488">article.html</text>

  <path class="edge" d="M1000 457 H1045"/>
  <rect class="role" x="1045" y="405" width="205" height="105" rx="12"/>
  <text class="box-title" x="1070" y="440">Fresh-eyes editor</text>
  <text class="box-copy" x="1070" y="464">checks, cuts, requests</text>
  <text class="artifact" x="1070" y="488">requested-changes.md</text>

  <path class="edge" d="M1250 457 H1295"/>
  <rect class="record" x="1295" y="405" width="215" height="105" rx="12"/>
  <text class="box-title" x="1320" y="440">Production record</text>
  <text class="box-copy" x="1320" y="464">all artifacts in PR body</text>
  <text class="artifact" x="1320" y="488">+ assets when earned</text>

  <path class="gold-edge dashed" d="M1145 405 C1145 370 650 370 650 405"/>
  <text class="edge-label" x="805" y="365">research gap</text>
  <path class="gold-edge dashed" d="M1145 510 C1145 585 905 585 905 510"/>
  <text class="edge-label" x="965" y="608">rewrite</text>
  <text class="box-copy" x="90" y="570">The editor routes a gap to research or a rewrite to the writer.</text>

  <rect class="band" x="55" y="710" width="1490" height="250" rx="18"/>
  <text class="band-title" x="80" y="740">PUBLISHING BOUNDARY</text>

  <path class="edge" d="M1400 510 V620 H170 V795"/>
  <text class="edge-label" x="1260" y="610">desk opens the PR</text>
  <rect class="gate" x="80" y="795" width="220" height="90" rx="12"/>
  <text class="box-title" x="105" y="831">Validation</text>
  <text class="box-copy" x="105" y="855">structure, sources, safety</text>
  <text class="artifact" x="105" y="877">engine/check.py</text>

  <path class="edge" d="M300 840 H360"/>
  <rect class="box" x="360" y="795" width="220" height="90" rx="12"/>
  <text class="box-title" x="385" y="831">Pull request</text>
  <text class="box-copy" x="385" y="855">article → library</text>

  <path class="edge" d="M580 840 H640"/>
  <rect class="gate" x="640" y="795" width="220" height="90" rx="12"/>
  <text class="box-title" x="665" y="831">PR CI</text>
  <text class="box-copy" x="665" y="855">read-only checks</text>

  <path class="edge" d="M860 840 H920"/>
  <rect class="box" x="920" y="795" width="220" height="90" rx="12"/>
  <text class="box-title" x="945" y="831">Merge</text>
  <text class="box-copy" x="945" y="855">clean PR → library</text>

  <path class="edge" d="M1140 840 H1200"/>
  <rect class="source" x="1200" y="795" width="220" height="90" rx="12"/>
  <text class="box-title" x="1225" y="831">GitHub Pages</text>
  <text class="box-copy" x="1225" y="855">paper + archive + feeds</text>

  <path class="gold-edge dashed" d="M190 795 V755 H1050 V665"/>
  <text class="edge-label" x="460" y="748">validation failure → desk fixes the relevant role</text>

  <rect class="failure" x="585" y="910" width="330" height="35" rx="9"/>
  <text class="box-copy" x="605" y="933">CI failure → orchestrator → desk</text>
  <path class="gold-edge dashed" d="M750 885 V910"/>
  <path class="gold-edge dashed" d="M750 910 V680"/>
</svg>
