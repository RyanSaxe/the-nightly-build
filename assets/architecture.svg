<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" role="img" aria-labelledby="diagram-title diagram-description">
  <title id="diagram-title">The Nightly Build article architecture</title>
  <desc id="diagram-description">Main enters the orchestrator, which commissions isolated article worktrees and directly launches every role. Voice coaching and research run in parallel before writing, editing, and publishing. Passing work opens a library pull request and publishes to GitHub Pages after green CI.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#71858d"/>
    </marker>
    <marker id="repair-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#c98612"/>
    </marker>
    <marker id="ci-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#c16e61"/>
    </marker>
    <marker id="message-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#795b95"/>
    </marker>
    <marker id="failure-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#c16e61"/>
    </marker>
    <style>
      .edge { fill: none; stroke: #71858d; stroke-width: 2.4; marker-end: url(#arrow); }
      .leader { fill: none; stroke: #9cafb2; stroke-width: 2; stroke-dasharray: 6 7; }
      .repair { fill: none; stroke: #c98612; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#repair-arrow); }
      .message { fill: none; stroke: #795b95; stroke-width: 2.2; stroke-dasharray: 4 6; marker-end: url(#message-arrow); }
      .failure { fill: none; stroke: #c16e61; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#failure-arrow); }
      .ci { fill: none; stroke: #c16e61; stroke-width: 2.3; stroke-dasharray: 8 6; marker-end: url(#ci-arrow); }
      .node-title { fill: #10212b; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .node-copy { fill: #61727b; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .artifact { fill: #795b95; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
      .panel-title { fill: #10212b; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .6px; }
      .panel-copy { fill: #61727b; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #5c7078; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .repair-label { fill: #9a680f; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .message-label { fill: #795b95; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .failure-label { fill: #a35349; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .ci-label { fill: #a35349; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="#fbfaf7"/>

  <rect x="80" y="300" width="1280" height="620" rx="24" fill="#fffdf8" stroke="#afbfbd" stroke-width="2" stroke-dasharray="9 7"/>
  <text class="panel-title" x="115" y="342">INSIDE EACH ISOLATED WORKTREE</text>
  <text class="panel-copy" x="115" y="367">The correspondent launches each role; artifacts carry state between isolated contexts.</text>

  <path class="edge" d="M210 170H270"/>
  <path class="edge" d="M490 170H580"/>
  <path class="leader" d="M690 215V300"/>
  <circle cx="690" cy="300" r="5" fill="#9cafb2"/>
  <path class="edge" d="M1260 170H1320"/>
  <path class="edge" d="M1225 530V225"/>

  <path class="ci" d="M1180 115V72Q1180 58 1166 58H394Q380 58 380 72V115"/>
  <rect x="706" y="43" width="150" height="28" rx="14" fill="#fbfaf7"/>
  <text class="ci-label" x="781" y="61" text-anchor="middle">CI failure · role routing</text>

  <rect x="50" y="130" width="160" height="80" rx="14" fill="#e8f2f4" stroke="#76a3ab" stroke-width="2"/>
  <text class="node-title" x="75" y="164">main</text>
  <text class="node-copy" x="75" y="187">engine + press/</text>

  <rect x="270" y="115" width="220" height="110" rx="14" fill="#fff3d7" stroke="#d49620" stroke-width="2"/>
  <text class="node-title" x="295" y="149">Orchestrator</text>
  <text class="node-copy" x="295" y="174">sync · select · commission</text>
  <text class="node-copy" x="295" y="201">launch · route · monitor</text>

  <rect x="592" y="115" width="220" height="100" rx="14" fill="#f7eed9" stroke="#d8b56a" stroke-width="1.5"/>
  <rect x="586" y="121" width="220" height="100" rx="14" fill="#fbf3df" stroke="#d8b56a" stroke-width="1.5"/>
  <rect x="580" y="127" width="220" height="100" rx="14" fill="#fff3d7" stroke="#d49620" stroke-width="2"/>
  <text class="node-title" x="605" y="161">Worktrees × N</text>
  <text class="node-copy" x="605" y="185">one article team per worktree</text>
  <text class="artifact" x="605" y="207">one task.md each</text>

  <rect x="1020" y="115" width="240" height="110" rx="14" fill="#f1ebf7" stroke="#9a7ab6" stroke-width="2"/>
  <text class="node-title" x="1045" y="146">PR on library</text>
  <text class="node-copy" x="1045" y="170">article + record + assets</text>
  <line x1="1045" y1="183" x2="1235" y2="183" stroke="#cdbdd9"/>
  <text class="artifact" x="1045" y="204">role artifacts included</text>

  <rect x="1320" y="130" width="100" height="80" rx="14" fill="#e8f2f4" stroke="#76a3ab" stroke-width="2"/>
  <text class="node-title" x="1370" y="163" text-anchor="middle">GitHub</text>
  <text class="node-title" x="1370" y="186" text-anchor="middle">Pages</text>

  <rect x="706" y="253" width="116" height="28" rx="14" fill="#fbfaf7"/>
  <text class="label" x="764" y="271" text-anchor="middle">expanded below</text>
  <rect x="1200" y="387" width="50" height="26" rx="13" fill="#fbfaf7"/>
  <text class="label" x="1225" y="404" text-anchor="middle">pass</text>

  <path class="edge" d="M260 560H300V455H340"/>
  <path class="edge" d="M260 600H300V705H340"/>
  <path class="edge" d="M530 455H575V560H620"/>
  <path class="edge" d="M530 705H575V600H620"/>
  <path class="edge" d="M795 580H875"/>
  <path class="edge" d="M1065 580H1140"/>

  <path class="failure" d="M765 530V500Q765 488 753 488H662Q650 488 650 500V530"/>
  <text class="failure-label" x="708" y="419" text-anchor="middle">
    <tspan x="708">bad HTML</tspan>
    <tspan x="708" dy="14">missing section</tspan>
    <tspan x="708" dy="14">broken citation</tspan>
    <tspan x="708" dy="14">banned term</tspan>
    <tspan x="708" dy="14">and more</tspan>
  </text>

  <path class="failure" d="M500 655V630Q500 618 488 618H397Q385 618 385 630V655"/>
  <text class="failure-label" x="443" y="609" text-anchor="middle">dead or invented URL</text>

  <path class="message" d="M635 530V390H480V405"/>
  <text class="message-label" x="557" y="385" text-anchor="middle">voice question</text>

  <path class="message" d="M635 630V780H480V755"/>
  <text class="message-label" x="557" y="775" text-anchor="middle">source question</text>

  <path class="repair" d="M945 630V650Q945 662 933 662H732Q720 662 720 650V630"/>
  <text class="repair-label" x="833" y="657" text-anchor="middle">rewrite request</text>

  <path class="repair" d="M900 630V825Q900 837 888 837H447Q435 837 435 825V755"/>
  <text class="repair-label" x="670" y="832" text-anchor="middle">source request</text>

  <path class="failure" d="M1240 630V735Q1240 747 1228 747H772Q760 747 760 735V630"/>
  <text class="failure-label" x="1000" y="742" text-anchor="middle">article check fails; writer repairs</text>

  <rect x="95" y="530" width="165" height="100" rx="13" fill="#e8f2f4" stroke="#76a3ab" stroke-width="2"/>
  <text class="node-title" x="115" y="556">Task</text>
  <text class="node-copy" x="115" y="578" style="font-size:12px">created by orchestrator</text>
  <text class="node-copy" x="115" y="598" style="font-size:12px">with requirements</text>
  <text class="artifact" x="115" y="619">task.md</text>

  <rect x="340" y="405" width="190" height="100" rx="13" fill="#fff3d7" stroke="#d49620" stroke-width="2"/>
  <text class="node-title" x="360" y="431">Voice</text>
  <text class="node-copy" x="360" y="453" style="font-size:12px">study relevant writers</text>
  <text class="node-copy" x="360" y="473" style="font-size:12px">for voice + style</text>
  <text class="artifact" x="360" y="494">voice.md</text>

  <rect x="340" y="655" width="190" height="100" rx="13" fill="#fff3d7" stroke="#d49620" stroke-width="2"/>
  <text class="node-title" x="360" y="681">Research</text>
  <text class="node-copy" x="360" y="703" style="font-size:12px">read + verify sources</text>
  <text class="node-copy" x="360" y="723" style="font-size:12px">log claims + citations</text>
  <text class="artifact" x="360" y="744">research.md</text>

  <rect x="620" y="530" width="175" height="100" rx="13" fill="#fff3d7" stroke="#d49620" stroke-width="2"/>
  <text class="node-title" x="640" y="556">Write</text>
  <text class="node-copy" x="640" y="578" style="font-size:12px">draft from research</text>
  <text class="node-copy" x="640" y="598" style="font-size:12px">run proof + revise</text>
  <text class="artifact" x="640" y="619">article.html</text>

  <rect x="875" y="530" width="190" height="100" rx="13" fill="#fff3d7" stroke="#d49620" stroke-width="2"/>
  <text class="node-title" x="895" y="556">Edit</text>
  <text class="node-copy" x="895" y="578" style="font-size:12px">tighten prose + punctuation</text>
  <text class="node-copy" x="895" y="598" style="font-size:12px">check citations + clarity</text>
  <text class="artifact" x="895" y="619">requested-changes.md</text>

  <rect x="1140" y="530" width="170" height="100" rx="13" fill="#e9f5ec" stroke="#6f9a78" stroke-width="2"/>
  <text class="node-title" x="1225" y="556" text-anchor="middle">Publish</text>
  <text class="node-copy" x="1225" y="578" text-anchor="middle" style="font-size:12px">proof + PR + CI</text>
  <text class="node-copy" x="1225" y="598" text-anchor="middle" style="font-size:12px">gate delivery</text>
  <text class="artifact" x="1225" y="619" text-anchor="middle">PR + green CI</text>

  <rect x="105" y="860" width="1230" height="40" rx="12" fill="#fbfaf7" stroke="#d7dfde"/>
  <text class="node-title" x="125" y="885" style="font-size:13px">KEY</text>
  <path class="edge" d="M180 880H220"/>
  <text class="label" x="233" y="884">artifact handoff</text>
  <path class="failure" d="M405 880H445"/>
  <text class="failure-label" x="458" y="884">check failure</text>
  <path class="repair" d="M625 880H665"/>
  <text class="repair-label" x="678" y="884">revision request</text>
  <path class="message" d="M875 880H915"/>
  <text class="message-label" x="928" y="884">peer question; answer updates artifact</text>
</svg>
