<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" role="img" aria-labelledby="diagram-title diagram-description">
  <title id="diagram-title">ChatGPT Scheduled Task architecture for The Nightly Build</title>
  <desc id="diagram-description">A daily ChatGPT Scheduled Task reads the repository contract, researches the public web, writes and revises an article, and opens a pull request through the GitHub app. GitHub Actions only validates, auto-merges, and publishes the article. GitHub Models and GitHub generation crons are not used.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#71858d"/>
    </marker>
    <marker id="repair-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#c16e61"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, ui-sans-serif, system-ui, sans-serif; fill: #26393f; }
      .subtitle { font: 400 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #5c7078; }
      .zone-title { font: 700 18px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 1.5px; fill: #4e646c; }
      .box-title { font: 700 20px Inter, ui-sans-serif, system-ui, sans-serif; fill: #26393f; }
      .box-copy { font: 400 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #526970; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #526970; }
      .boundary { stroke-width: 2; rx: 24; }
      .box { stroke-width: 2; rx: 18; }
      .flow { fill: none; stroke: #71858d; stroke-width: 3; marker-end: url(#arrow); }
      .repair { fill: none; stroke: #c16e61; stroke-width: 3; stroke-dasharray: 10 8; marker-end: url(#repair-arrow); }
    </style>
  </defs>

  <text class="title" x="720" y="55" text-anchor="middle">ChatGPT Scheduled Task: research and writing outside GitHub Actions</text>
  <text class="subtitle" x="720" y="87" text-anchor="middle">The task authors one PR; GitHub independently proves, merges, and publishes it.</text>

  <rect class="boundary" x="38" y="120" width="790" height="718" fill="#f7fafb" stroke="#76a3ab"/>
  <text class="zone-title" x="72" y="158">CHATGPT — SCHEDULER + AUTHORING RUNTIME</text>

  <rect class="boundary" x="858" y="120" width="544" height="718" fill="#fbfafc" stroke="#9a7ab6"/>
  <text class="zone-title" x="892" y="158">GITHUB — STATE + INDEPENDENT DELIVERY</text>

  <rect class="box" x="82" y="190" width="700" height="100" fill="#e8f2f4" stroke="#76a3ab"/>
  <text class="box-title" x="432" y="228" text-anchor="middle">Daily ChatGPT Scheduled Task</text>
  <text class="box-copy" x="432" y="256" text-anchor="middle">Runs on the chosen clock with the public web and connected GitHub app</text>
  <text class="small" x="432" y="278" text-anchor="middle">One schedule per paper · no local machine · no GitHub model call</text>

  <rect class="box" x="82" y="340" width="210" height="140" fill="#ffffff" stroke="#afbfbd"/>
  <text class="box-title" x="187" y="377" text-anchor="middle">Read state</text>
  <text class="box-copy" x="187" y="407" text-anchor="middle">WEB_TASK.md</text>
  <text class="box-copy" x="187" y="431" text-anchor="middle">press + templates</text>
  <text class="box-copy" x="187" y="455" text-anchor="middle">library + open PRs</text>

  <rect class="box" x="327" y="340" width="210" height="140" fill="#ffffff" stroke="#afbfbd"/>
  <text class="box-title" x="432" y="377" text-anchor="middle">Research</text>
  <text class="box-copy" x="432" y="407" text-anchor="middle">Search the public web</text>
  <text class="box-copy" x="432" y="431" text-anchor="middle">Open every cited source</text>
  <text class="box-copy" x="432" y="455" text-anchor="middle">Verify ownership + independence</text>

  <rect class="box" x="572" y="340" width="210" height="140" fill="#ffffff" stroke="#afbfbd"/>
  <text class="box-title" x="677" y="377" text-anchor="middle">Write + revise</text>
  <text class="box-copy" x="677" y="407" text-anchor="middle">Select the subject</text>
  <text class="box-copy" x="677" y="431" text-anchor="middle">Draft cited HTML</text>
  <text class="box-copy" x="677" y="455" text-anchor="middle">Bounded repair loop</text>

  <path class="flow" d="M292 410H315"/>
  <path class="flow" d="M537 410H560"/>

  <rect class="box" x="242" y="550" width="380" height="128" fill="#f1ebf7" stroke="#9a7ab6"/>
  <text class="box-title" x="432" y="590" text-anchor="middle">GitHub app writes the proposal</text>
  <text class="box-copy" x="432" y="620" text-anchor="middle">Branch from current library head</text>
  <text class="box-copy" x="432" y="644" text-anchor="middle">Commit only the article bundle · open PR to library</text>
  <path class="flow" d="M677 480V520H432V538"/>

  <rect class="box" x="82" y="730" width="700" height="72" fill="#fff4f1" stroke="#c16e61"/>
  <text class="box-title" x="432" y="760" text-anchor="middle">Not used for article generation</text>
  <text class="box-copy" x="432" y="785" text-anchor="middle">GitHub Models · actions/ai-inference · GitHub generation cron</text>

  <rect class="box" x="900" y="190" width="210" height="112" fill="#e8f2f4" stroke="#76a3ab"/>
  <text class="box-title" x="1005" y="228" text-anchor="middle">main</text>
  <text class="box-copy" x="1005" y="256" text-anchor="middle">Engine + press + WEB_TASK</text>
  <text class="box-copy" x="1005" y="280" text-anchor="middle">Read-only during article runs</text>

  <rect class="box" x="1150" y="190" width="210" height="112" fill="#f1ebf7" stroke="#9a7ab6"/>
  <text class="box-title" x="1255" y="228" text-anchor="middle">Article PR</text>
  <text class="box-copy" x="1255" y="256" text-anchor="middle">HTML + production record</text>
  <text class="box-copy" x="1255" y="280" text-anchor="middle">Target: library</text>

  <rect class="box" x="900" y="390" width="210" height="128" fill="#fff4f1" stroke="#c16e61"/>
  <text class="box-title" x="1005" y="429" text-anchor="middle">CI editor</text>
  <text class="box-copy" x="1005" y="458" text-anchor="middle">Deterministic proof</text>
  <text class="box-copy" x="1005" y="482" text-anchor="middle">Browser render probe</text>
  <text class="box-copy" x="1005" y="506" text-anchor="middle">No model · no research</text>

  <rect class="box" x="1150" y="390" width="210" height="128" fill="#e9f5ec" stroke="#6f9a78"/>
  <text class="box-title" x="1255" y="429" text-anchor="middle">Auto-merge gate</text>
  <text class="box-copy" x="1255" y="458" text-anchor="middle">Only after green validate</text>
  <text class="box-copy" x="1255" y="482" text-anchor="middle">No human or task bypass</text>

  <rect class="box" x="900" y="608" width="210" height="112" fill="#f1ebf7" stroke="#9a7ab6"/>
  <text class="box-title" x="1005" y="646" text-anchor="middle">library</text>
  <text class="box-copy" x="1005" y="674" text-anchor="middle">Published article state</text>
  <text class="box-copy" x="1005" y="698" text-anchor="middle">Next task reads it back</text>

  <rect class="box" x="1150" y="608" width="210" height="112" fill="#e8f2f4" stroke="#76a3ab"/>
  <text class="box-title" x="1255" y="646" text-anchor="middle">Static publisher</text>
  <text class="box-copy" x="1255" y="674" text-anchor="middle">Build site + archive + feed</text>
  <text class="box-copy" x="1255" y="698" text-anchor="middle">Serve immutable output</text>

  <path class="flow" d="M1100 246H1138"/>
  <path class="flow" d="M1255 302V348H1005V378"/>
  <path class="flow" d="M1110 454H1138"/>
  <path class="flow" d="M1255 518V570H1005V596"/>
  <path class="flow" d="M1110 664H1138"/>

  <path class="flow" d="M622 614H815V246H888"/>
  <path class="flow" d="M622 614H1138V246"/>
  <path class="repair" d="M900 470H840V315H432V302"/>
  <text class="small" x="720" y="338" text-anchor="middle" fill="#a35349">blocked CI → next task repairs the same PR</text>

  <text class="subtitle" x="1130" y="792" text-anchor="middle">GitHub Actions are intentionally boring:</text>
  <text class="small" x="1130" y="820" text-anchor="middle">validate · auto-merge · publish</text>
</svg>
